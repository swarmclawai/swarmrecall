services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: swarmrecall
      POSTGRES_PASSWORD: swarmrecall
      POSTGRES_DB: swarmrecall
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: localdev
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  redisdata:
  meilidata:
