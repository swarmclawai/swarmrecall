services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "65432:5432"
    environment:
      POSTGRES_USER: swarmrecall
      POSTGRES_PASSWORD: swarmrecall
      POSTGRES_DB: swarmrecall
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: localdev
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
