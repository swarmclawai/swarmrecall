services:
  - type: web
    name: swarmrecall-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarmrecall-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://swarmrecall.ai
      - key: MEILISEARCH_URL
        value: http://swarmrecall-search:7700
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: swarmrecall-a0898
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: pserv
    name: swarmrecall-search
    runtime: image
    image:
      url: docker.io/getmeili/meilisearch:v1.12
    disk:
      name: meili-data
      mountPath: /meili_data
      sizeGB: 1

databases:
  - name: swarmrecall-db
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
